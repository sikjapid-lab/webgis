<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ردیاب زنده پروازها (OpenSky Live Tracker)</title>

  <!-- کتابخانه‌های نقشه -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { height: 100%; width: 100%; font-family: Tahoma, sans-serif; overflow: hidden; background: #0a0f14; color: #fff; }

    #app { display: flex; flex-direction: column; height: 100vh; }

    header {
      height: 50px; background: #111822; border-bottom: 1px solid #1e293b;
      display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
    }
    .title { font-weight: bold; font-size: 15px; color: #2dd4e8; }
    .status { font-size: 12px; color: #94a3b8; }

    #mapContainer { display: grid; grid-template-columns: 1fr 1fr; flex: 1; min-height: 0; }
    #leafletMap, #cesiumMap { height: 100%; width: 100%; position: relative; }
    #leafletMap { border-left: 2px solid #1e293b; }

    .map-label {
      position: absolute; top: 10px; right: 10px; z-index: 1000;
      background: rgba(15, 23, 42, 0.85); color: #2dd4e8; padding: 4px 10px;
      border-radius: 6px; font-size: 11px; font-weight: bold; border: 1px solid #1e293b;
    }

    /* استایل‌های Cesium جهت حذف عناصر اضافه UI */
    .cesium-viewer-bottom, .cesium-widget-credits, .cesium-viewer-toolbar { display: none !important; }
  </style>
</head>
<body>

<div id="app">
  <header>
    <div class="title">✈️ ردیاب زنده پروازهای OpenSky Network</div>
    <div class="status" id="statusText">در حال دریافت داده‌های اولیه...</div>
  </header>

  <div id="mapContainer">
    <div id="leafletMap">
      <div class="map-label">نمای ۲بعدی (Leaflet)</div>
    </div>
    <div id="cesiumMap">
      <div class="map-label">نمای ۳بعدی (Cesium)</div>
    </div>
  </div>
</div>

<!-- اسکریپت‌ها -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>

<script>
(function() {
  /* ==========================================================================
     ۱. مقداردهی اولیه نقشه ۲بعدی (Leaflet)
     ========================================================================== */
  const leafletMap = L.map('leafletMap', { zoomControl: true }).setView([32.4279, 53.6880], 5);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
    maxZoom: 18,
    subdomains: 'abcd'
  }).addTo(leafletMap);

  const flightLeafletGroup = L.layerGroup().addTo(leafletMap);

  /* ==========================================================================
     ۲. مقداردهی اولیه نقشه ۳بعدی (Cesium)
     ========================================================================== */
  Cesium.Ion.defaultAccessToken = undefined;
  const cesiumViewer = new Cesium.Viewer('cesiumMap', {
    imageryProvider: false, baseLayerPicker: false, geocoder: false, homeButton: false,
    sceneModePicker: false, navigationHelpButton: false, animation: false, timeline: false,
    fullscreenButton: false, infoBox: false, selectionIndicator: false,
    terrainProvider: new Cesium.EllipsoidTerrainProvider()
  });

  cesiumViewer.imageryLayers.addImageryProvider(
    new Cesium.UrlTemplateImageryProvider({
      url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
      subdomains: ['a', 'b', 'c', 'd']
    })
  );

  cesiumViewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(53.6880, 32.4279, 3000000),
    duration: 0
  });

  let flightCesiumEntities = [];

  /* ==========================================================================
     ۳. آیکون سفارشی هواپیما (با قابلیت چرخش بر اساس جهت پرواز)
     ========================================================================== */
  function planeIcon(headingDeg) {
    return L.divIcon({
      className: 'flight-icon-wrap',
      html: `<svg width="22" height="22" viewBox="0 0 24 24" style="transform:rotate(${headingDeg || 0}deg); display:block;">
              <path d="M12 2 L15 10 L22 13 L15 15 L16 21 L12 19 L8 21 L9 15 L2 13 L9 10 Z" fill="#2dd4e8" stroke="#080f14" stroke-width="1"/>
             </svg>`,
      iconSize: [22, 22],
      iconAnchor: [11, 11]
    });
  }

  /* ==========================================================================
     ۴. تابع دریافت مستقیم داده پروازها از API عمومی OpenSky
     ========================================================================== */
  let isFetching = false;

  async function fetchFlights() {
    if (isFetching) return;
    isFetching = true;

    const statusEl = document.getElementById('statusText');
    statusEl.textContent = 'در حال بروزرسانی پروازها...';

    try {
      const b = leafletMap.getBounds();
      const apiUrl = `https://opensky-network.org/api/states/all?lamin=${b.getSouth().toFixed(4)}&lomin=${b.getWest().toFixed(4)}&lamax=${b.getNorth().toFixed(4)}&lomax=${b.getEast().toFixed(4)}`;

      let data = null;

      // دریافت مستقیم و بدون نیاز به پروکسی/OAuth
      try {
        const res = await fetch(apiUrl, { signal: AbortSignal.timeout(6000) });
        if (res.ok) data = await res.json();
      } catch (e) {
        // Fallback پروکسی ساده GET
        const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(apiUrl);
        const resProxy = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
        if (resProxy.ok) data = await resProxy.json();
      }

      if (!data || !data.states) {
        statusEl.textContent = 'هیچ پروازی در این محدوده یافت نشد یا محدودیت درخواست رخ داده است.';
        isFetching = false;
        return;
      }

      // پاک‌سازی تمام عارضه‌های قبلی
      flightLeafletGroup.clearLayers();
      flightCesiumEntities.forEach(ent => cesiumViewer.entities.remove(ent));
      flightCesiumEntities = [];

      const states = data.states.slice(0, 200); // نمایش حداکثر ۲۰۰ پرواز برای حفظ روان بودن سیستم

      states.forEach(s => {
        const [icao24, callsign, originCountry, , , lon, lat, baroAlt, onGround, velocity, trueTrack] = s;
        if (lat == null || lon == null) return;

        const flightCode = (callsign || icao24 || 'N/A').trim();
        const altitude = baroAlt ? Math.round(baroAlt) : 0;
        const speed = velocity ? Math.round(velocity * 3.6) : 0;

        const popupContent = `
          <div style="direction:rtl; font-size:12px; line-height:1.6;">
            <b style="color:#2dd4e8;">پرواز: ${flightCode}</b><br>
            <b>کشور:</b> ${originCountry}<br>
            <b>ارتفاع:</b> ${altitude} متر<br>
            <b>سرعت:</b> ${speed} km/h
          </div>
        `;

        // ۱. اضافه کردن به Leaflet
        const marker = L.marker([lat, lon], { icon: planeIcon(trueTrack) }).bindPopup(popupContent);
        flightLeafletGroup.addLayer(marker);

        // ۲. اضافه کردن به Cesium
        const entity = cesiumViewer.entities.add({
          position: Cesium.Cartesian3.fromDegrees(lon, lat, altitude || 100),
          point: { pixelSize: 6, color: Cesium.Color.CYAN, outlineColor: Cesium.Color.BLACK, outlineWidth: 1 },
          description: popupContent
        });
        flightCesiumEntities.push(entity);
      });

      statusEl.textContent = `تعداد ${states.length} پرواز زنده در محدوده فعال است (بروزرسانی بعدی: ۱۵ ثانیه دیگر)`;

    } catch (err) {
      console.error('خطا در دریافت پروازها:', err);
      statusEl.textContent = 'خطا در برقراری ارتباط با OpenSky. مجدداً تلاش خواهد شد...';
    } finally {
      isFetching = false;
    }
  }

  /* ==========================================================================
     ۵. زمان‌بندی و رویدادها
     ========================================================================== */
  // اجرای اولیه
  fetchFlights();

  // بازخوانی خودکار هر ۱۵ ثانیه یک‌بار (طابق قوانین API OpenSky)
  setInterval(fetchFlights, 15000);

  // بروزرسانی پروازها هنگام جابجایی یا زوم نقشه ۲بعدی
  leafletMap.on('moveend', fetchFlights);
})();
</script>
</body>
</html>
