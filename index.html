<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه پیشرفته GIS - استخراج و پردازش داده‌های OpenStreetMap</title>
    
    <!-- Leaflet CSS for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- SheetJS for XLSX generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #f0f2f5;
            color: #333;
        }
        #sidebar {
            width: 400px;
            background: #ffffff;
            padding: 25px;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            overflow-y: auto;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #map {
            flex-grow: 1;
            height: 100%;
            z-index: 1;
        }
        .header-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 5px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-weight: 600;
            font-size: 0.9em;
            color: #555;
        }
        input[type="text"], input[type="number"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccd1d9;
            border-radius: 6px;
            font-size: 0.9em;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            border-color: #3498db;
            outline: none;
        }
        textarea {
            height: 120px;
            resize: vertical;
            direction: ltr;
            font-family: monospace;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            align-items: center;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #e1e8ed;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            margin: 0;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #34495e;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        button:hover {
            background-color: #2c3e50;
            transform: translateY(-1px);
        }
        .btn-excel {
            background-color: #27ae60;
        }
        .btn-excel:hover {
            background-color: #219653;
        }
        .btn-kml {
            background-color: #d35400;
        }
        .btn-kml:hover {
            background-color: #e67e22;
        }
        .button-row {
            display: flex;
            gap: 10px;
        }
        #status {
            padding: 15px;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 600;
            background: #e8f8f5;
            border: 1px solid #1abc9c;
            color: #16a085;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header-title">تنظیمات استخراج (Overpass API)</div>
        
        <div class="form-group">
            <label>کوئری Overpass (فرمت JSON):</label>
            <textarea id="overpassQuery">[out:json][timeout:25];
area["name"="Tehran"]->.searchArea;
(
  node["building"](area.searchArea);
  way["building"](area.searchArea);
  relation["building"](area.searchArea);
);
out center;</textarea>
        </div>

        <div class="header-title" style="font-size: 1.1em; margin-top: 10px;">فیلترهای ابعادی</div>
        
        <div class="button-row">
            <div class="form-group" style="flex: 1;">
                <label>طول (m):</label>
                <input type="number" id="filterLength" placeholder="حداقل...">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>عرض (m):</label>
                <input type="number" id="filterWidth" placeholder="حداقل...">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>ارتفاع (m):</label>
                <input type="number" id="filterHeight" placeholder="حداقل...">
            </div>
        </div>
        
        <div class="radio-group">
            <label>منطق ترکیب فیلترها:</label>
            <label><input type="radio" name="filterLogic" value="AND" checked> AND</label>
            <label><input type="radio" name="filterLogic" value="OR"> OR</label>
        </div>

        <div style="margin-top: 10px;">
            <button onclick="fetchData()">دریافت و پردازش داده‌ها</button>
        </div>
        
        <div class="button-row">
            <button class="btn-excel" onclick="exportToExcel()">خروجی XLSX</button>
            <button class="btn-kml" onclick="exportToKML()">خروجی KML</button>
        </div>

        <div id="status">وضعیت: آماده</div>
    </div>
    
    <div id="map"></div>

    <script>
        // 1. مقداردهی اولیه نقشه Leaflet
        const map = L.map('map').setView([35.6892, 51.3890], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let geojsonLayer = L.geoJSON(null, {
            pointToLayer: function (feature, latlng) {
                return L.circleMarker(latlng, {
                    radius: 6,
                    fillColor: "#e74c3c",
                    color: "#c0392b",
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 0.8
                });
            },
            onEachFeature: function (feature, layer) {
                if (feature.properties && feature.properties.name) {
                    layer.bindPopup(`<b>${feature.properties.name}</b><br>ID: ${feature.properties.id}`);
                }
            }
        }).addTo(map);
        
        let globalData = [];

        // 2. الگوریتم Failover برای سرورهای Overpass
        const OVERPASS_SERVERS = [
            'https://overpass-api.de/api/interpreter',
            'https://lz4.overpass-api.de/api/interpreter',
            'https://z.overpass-api.de/api/interpreter',
            'https://overpass.kumi.systems/api/interpreter'
        ];

        // 3. تبدیل مختصات به درجه، دقیقه، ثانیه (DMS)
        function ddToDms(dd, isLng) {
            const dir = dd < 0 ? (isLng ? 'W' : 'S') : (isLng ? 'E' : 'N');
            const absDd = Math.abs(dd);
            const deg = Math.floor(absDd);
            const frac = absDd - deg;
            const min = Math.floor(frac * 60);
            const sec = ((frac * 60 - min) * 60).toFixed(2);
            return `${deg}°${min}'${sec}"${dir}`;
        }

        // 4. مدیریت وضعیت UI
        function setStatus(msg, type = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.style.display = 'block';
            statusEl.innerText = 'وضعیت: ' + msg;
            
            if (type === 'error') {
                statusEl.style.backgroundColor = '#fdedec';
                statusEl.style.borderColor = '#e74c3c';
                statusEl.style.color = '#c0392b';
            } else if (type === 'success') {
                statusEl.style.backgroundColor = '#e8f8f5';
                statusEl.style.borderColor = '#1abc9c';
                statusEl.style.color = '#16a085';
            } else {
                statusEl.style.backgroundColor = '#eaf2f8';
                statusEl.style.borderColor = '#3498db';
                statusEl.style.color = '#2980b9';
            }
        }

        // 5. متد اصلی واکشی داده‌ها از سرور
        async function fetchData() {
            const query = document.getElementById('overpassQuery').value;
            if (!query.trim()) {
                setStatus('کوئری نمی‌تواند خالی باشد.', 'error');
                return;
            }

            setStatus('در حال ارتباط با سرورهای Overpass...', 'info');
            
            let data = null;
            let success = false;

            // تلاش برای اتصال به سرورها به ترتیب
            for (let i = 0; i < OVERPASS_SERVERS.length; i++) {
                const server = OVERPASS_SERVERS[i];
                try {
                    setStatus(`تلاش برای دریافت از سرور ${i+1}: ${server}`, 'info');
                    const response = await fetch(server, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: 'data=' + encodeURIComponent(query)
                    });
                    
                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    
                    data = await response.json();
                    success = true;
                    setStatus('داده‌ها با موفقیت دریافت شدند. در حال پردازش...', 'success');
                    break; 
                } catch (error) {
                    console.warn(`خطا در سرور ${server}:`, error);
                }
            }

            if (!success || !data) {
                setStatus('خطا: تمامی سرورهای Overpass در دسترس نیستند.', 'error');
                return;
            }

            processFeatureResults(data.elements);
        }

        // 6. پردازش منطق فیلترها
        function processFeatureResults(elements) {
            const minLength = parseFloat(document.getElementById('filterLength').value) || 0;
            const minWidth = parseFloat(document.getElementById('filterWidth').value) || 0;
            const minHeight = parseFloat(document.getElementById('filterHeight').value) || 0;
            const logic = document.querySelector('input[name="filterLogic"]:checked').value;

            globalData = [];
            geojsonLayer.clearLayers();

            const filteredElements = elements.filter(el => {
                const tags = el.tags || {};
                const length = parseFloat(tags.length) || 0;
                const width = parseFloat(tags.width) || 0;
                const height = parseFloat(tags.height) || 0;

                let passesFilter = false;
                
                const condL = length >= minLength;
                const condW = width >= minWidth;
                const condH = height >= minHeight;

                if (logic === 'AND') {
                    passesFilter = (minLength === 0 || condL) && 
                                   (minWidth === 0 || condW) && 
                                   (minHeight === 0 || condH);
                } else { // OR logic
                    passesFilter = (minLength > 0 && condL) || 
                                   (minWidth > 0 && condW) || 
                                   (minHeight > 0 && condH);
                    
                    // اگر هیچ فیلتری وارد نشده باشد، همه را نمایش بده
                    if (minLength === 0 && minWidth === 0 && minHeight === 0) {
                        passesFilter = true;
                    }
                }
                return passesFilter;
            });

            const geoJsonFeatures = [];

            filteredElements.forEach(el => {
                const lat = el.lat || (el.center && el.center.lat);
                const lon = el.lon || (el.center && el.center.lon);
                
                if (!lat || !lon) return;

                const tags = el.tags || {};
                const name = tags.name || 'بدون نام';
                
                // آماده‌سازی داده برای اکسل و KML
                globalData.push({
                    'شناسه (ID)': el.id,
                    'نوع': el.type,
                    'نام': name,
                    'عرض جغرافیایی (DD)': lat,
                    'طول جغرافیایی (DD)': lon,
                    'عرض جغرافیایی (DMS)': ddToDms(lat, false),
                    'طول جغرافیایی (DMS)': ddToDms(lon, true),
                    'طول (متر)': tags.length || '',
                    'عرض (متر)': tags.width || '',
                    'ارتفاع (متر)': tags.height || ''
                });

                // افزودن به نقشه
                geoJsonFeatures.push({
                    "type": "Feature",
                    "properties": { "name": name, "id": el.id },
                    "geometry": {
                        "type": "Point",
                        "coordinates": [lon, lat]
                    }
                });
            });

            geojsonLayer.addData(geoJsonFeatures);
            
            if (geoJsonFeatures.length > 0) {
                map.fitBounds(geojsonLayer.getBounds(), { padding: [50, 50] });
            }

            setStatus(`پردازش تکمیل شد. ${filteredElements.length} عارضه پیدا شد.`, 'success');
        }

        // 7. استخراج کامل اطلاعات به فایل اکسل
        function exportToExcel() {
            if (globalData.length === 0) {
                alert('لطفا ابتدا داده‌ها را دریافت و پردازش کنید.');
                return;
            }
            const worksheet = XLSX.utils.json_to_sheet(globalData);
            
            // تنظیم راست‌چین بودن و عرض ستون‌ها در شیت
            if (!worksheet['!cols']) worksheet['!cols'] = [];
            worksheet['!cols'] = [
                { wch: 15 }, { wch: 10 }, { wch: 25 }, { wch: 18 }, { wch: 18 },
                { wch: 20 }, { wch: 20 }, { wch: 10 }, { wch: 10 }, { wch: 10 }
            ];

            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Overpass_GIS_Data");
            XLSX.writeFile(workbook, "Overpass_Export.xlsx");
        }

        // 8. تولید خروجی KML برای نرم‌افزارهای سه‌بعدی
        function exportToKML() {
            if (globalData.length === 0) {
                alert('لطفا ابتدا داده‌ها را دریافت و پردازش کنید.');
                return;
            }
            
            let kml = '<?xml version="1.0" encoding="UTF-8"?>
';
            kml += '<kml xmlns="http://www.opengis.net/kml/2.2">
';
            kml += '  <Document>
';
            kml += '    <name>Overpass GIS Export</name>
';
            
            // استایل پایه KML
            kml += '    <Style id="customPoint">
';
            kml += '      <IconStyle>
';
            kml += '        <Icon><href>http://maps.google.com/mapfiles/kml/paddle/red-circle.png</href></Icon>
';
            kml += '      </IconStyle>
';
            kml += '    </Style>
';

            globalData.forEach(row => {
                kml += '    <Placemark>
';
                kml += `      <name><![CDATA[${row['نام']}]]></name>
`;
                kml += '      <styleUrl>#customPoint</styleUrl>
';
                kml += '      <description><![CDATA[';
                kml += `شناسه: ${row['شناسه (ID)']}<br>`;
                kml += `نوع عارضه: ${row['نوع']}<br>`;
                kml += `مختصات: ${row['عرض جغرافیایی (DMS)']} / ${row['طول جغرافیایی (DMS)']}<br>`;
                kml += `طول: ${row['طول (متر)'] || 'نامشخص'}<br>`;
                kml += `عرض: ${row['عرض (متر)'] || 'نامشخص'}<br>`;
                kml += `ارتفاع: ${row['ارتفاع (متر)'] || 'نامشخص'}`;
                kml += ']]></description>
';
                kml += '      <Point>
';
                kml += `        <coordinates>${row['طول جغرافیایی (DD)']},${row['عرض جغرافیایی (DD)']},0</coordinates>
`;
                kml += '      </Point>
';
                kml += '    </Placemark>
';
            });

            kml += '  </Document>
';
            kml += '</kml>';

            const blob = new Blob([kml], { type: 'application/vnd.google-earth.kml+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Overpass_Export.kml';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
