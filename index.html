<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سامانه ابری Web GIS سینک شده (2D / 3D)</title>
    
    <!-- CesiumJS CSS & JS -->
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Tahoma, Geneva, sans-serif;
            background-color: #1e1e1e;
            color: #fff;
        }
        #header {
            height: 50px;
            background: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 10;
            position: relative;
        }
        #main-container {
            display: flex;
            width: 100%;
            height: calc(100% - 50px);
            position: relative;
        }
        .map-container {
            width: 50%;
            height: 100%;
            position: relative;
            box-sizing: border-box;
        }
        #view3D {
            border-left: 2px solid #34495e;
        }
        #view2D {
            border-right: 2px solid #34495e;
        }
        .view-label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 15px;
            border-radius: 4px;
            z-index: 5;
            pointer-events: none;
            font-size: 12px;
            border: 1px solid #3498db;
        }
        #toolbar {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(44, 62, 80, 0.9);
            padding: 10px;
            border-radius: 8px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 200px;
        }
        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-family: Tahoma;
            font-size: 11px;
            transition: background 0.2s;
        }
        .btn:hover { background: #2980b9; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        #infobar {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 11px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="header">
        <h3>سامانه هوشمند Web GIS ابری (همگام‌سازی دو بعدی و سه بعدی)</h3>
        <div id="status">وضعیت اتصال: برخط (رایگان)</div>
    </div>

    <div id="main-container">
        <!-- ابزارهای تحلیلی و مدیریتی -->
        <div id="toolbar">
            <span style="font-size: 12px; border-bottom: 1px solid #fff; padding-bottom: 4px; margin-bottom: 5px;">ابزارهای تحلیلی</span>
            <button class="btn" onclick="toggleAnalysisMode('measure')">خط‌کش (اندازه‌گیری مسافت)</button>
            <button class="btn btn-danger" onclick="clearAnalysis()">پاکسازی ترسیمات</button>
            <span style="font-size: 11px; margin-top: 5px;">نقشه پایه سه بعدی:</span>
            <button class="btn" onclick="changeBaseMap(true)">تغییر به OSM</button>
        </div>

        <!-- نوار نمایش اطلاعات مختصات -->
        <div id="infobar">مختصات: در حال دریافت...</div>

        <!-- نمای سه بعدی -->
        <div id="view3D" class="map-container">
            <div class="view-label">نمای ۳ بعدی (Cesium Globe)</div>
        </div>

        <!-- نمای دو بعدی -->
        <div id="view2D" class="map-container">
            <div class="view-label">نمای ۲ بعدی (Cesium Columbus/2D)</div>
        </div>
    </div>

    <script>
        // تعریف متغیرهای اصلی دو کره و ابزارها
        let viewer3D, viewer2D;
        let isSyncing = false;
        let activeMode = null;
        let measurePositions = [];
        let activePolyline = null;

        // تنظیمات ساختار اولیه نقشه‌ها
        function initGIS() {
            // ایجاد نمونه سه بعدی
            viewer3D = new Cesium.Viewer('view3D', {
                sceneMode: Cesium.SceneMode.SCENE3D,
                baseLayerPicker: true,
                geocoder: false,
                homeButton: true,
                navigationHelpButton: false,
                timeline: false,
                animation: false,
                fullscreenButton: false
            });

            // ایجاد نمونه دو بعدی (با استفاده از حالت COLUMBUS_VIEW برای انطباق هندسی بهتر یا 2D)
            viewer2D = new Cesium.Viewer('view2D', {
                sceneMode: Cesium.SceneMode.SCENE2D,
                baseLayerPicker: false,
                geocoder: false,
                homeButton: false,
                navigationHelpButton: false,
                timeline: false,
                animation: false,
                fullscreenButton: false,
                imageryProvider: new Cesium.OpenStreetMapImageryProvider({
                    url: 'https://a.tile.openstreetmap.org/'
                })
            });

            // تنظیم موقعیت اولیه روی ایران
            const initialView = Cesium.Cartesian3.fromDegrees(53.6880, 32.4279, 2500000);
            viewer3D.camera.setView({ destination: initialView });
            viewer2D.camera.setView({ destination: initialView });

            // راه‌اندازی مکانیزم همگام‌سازی (Sync Dynamic Camera)
            setupCameraSync();

            // راه‌اندازی رویدادهای ماوس برای ابزارهای تحلیلی
            setupMouseEvents();
        }

        // سیستم همگام‌سازی متقابل دوربین‌ها بدون ایجاد لوپ بی‌نهایت
        function setupCameraSync() {
            const camera3D = viewer3D.camera;
            const camera2D = viewer2D.camera;

            function syncView(sourceCamera, targetViewer) {
                if (isSyncing) return;
                isSyncing = true;

                const center = sourceCamera.positionCartographic;
                const heading = sourceCamera.heading;
                const pitch = sourceCamera.pitch;
                const roll = sourceCamera.roll;
                const height = center.height;

                targetViewer.camera.setView({
                    destination: Cesium.Cartesian3.fromRadians(center.longitude, center.latitude, height),
                    orientation: {
                        heading: heading,
                        pitch: targetViewer.scene.mode === Cesium.SceneMode.SCENE2D ? Cesium.Math.toRadians(-90) : pitch,
                        roll: roll
                    }
                });

                isSyncing = false;
            }

            // شنود تغییرات دوربین در نمای سه بعدی
            camera3D.changed.addEventListener(() => {
                if (viewer3D.scene.mode === Cesium.SceneMode.SCENE3D) {
                    syncView(camera3D, viewer2D);
                }
            });

            // شنود تغییرات دوربین در نمای دو بعدی
            camera2D.changed.addEventListener(() => {
                syncView(camera2D, viewer3D);
            });
        }

        // مدیریت ایونت‌های ماوس برای نمایش مختصات لحظه‌ای و تحلیل مسافت
        function setupMouseEvents() {
            const handler = new Cesium.ScreenSpaceEventHandler(viewer3D.scene.canvas);
            
            handler.setInputAction(function (movement) {
                const cartesian = viewer3D.camera.pickEllipsoid(movement.endPosition, viewer3D.scene.globe.ellipsoid);
                if (cartesian) {
                    const cartographic = Cesium.Cartographic.fromCartesian(cartesian);
                    const longitudeString = Cesium.Math.toDegrees(cartographic.longitude).toFixed(4);
                    const latitudeString = Cesium.Math.toDegrees(cartographic.latitude).toFixed(4);
                    
                    document.getElementById('infobar').innerText = `طول جغرافیایی: ${longitudeString} | عرض جغرافیایی: ${latitudeString}`;
                }
            }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

            // رویداد کلیک برای اندازه‌گیری مسافت
            handler.setInputAction(function (click) {
                if (activeMode !== 'measure') return;

                const cartesian = viewer3D.camera.pickEllipsoid(click.position, viewer3D.scene.globe.ellipsoid);
                if (cartesian) {
                    measurePositions.push(cartesian);
                    
                    // ترسیم نقطه روی نقشه سه بعدی و دو بعدی
                    drawPoint(cartesian);

                    if (measurePositions.length > 1) {
                        updatePolyline();
                        calculateDistance();
                    }
                }
            }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
        }

        function toggleAnalysisMode(mode) {
            activeMode = (activeMode === mode) ? null : mode;
            if (activeMode === 'measure') {
                alert('حالت خط‌کش فعال شد. روی نقشه ۳ بعدی کلیک کنید تا نقاط ترسیم شوند.');
            }
        }

        function drawPoint(position) {
            const pointConfig = {
                pixelSize: 8,
                color: Cesium.Color.RED,
                outlineColor: Cesium.Color.WHITE,
                outlineWidth: 2
            };
            viewer3D.entities.add({ position: position, point: pointConfig });
            viewer2D.entities.add({ position: position, point: pointConfig });
        }

        function updatePolyline() {
            if (activePolyline) {
                viewer3D.entities.remove(activePolyline);
                viewer2D.entities.remove(activePolyline);
            }

            const polylineConfig = {
                positions: measurePositions,
                width: 3,
                material: Cesium.Color.YELLOW
            };

            activePolyline = viewer3D.entities.add({ polyline: polylineConfig });
            viewer2D.entities.add({ polyline: polylineConfig });
        }

        function calculateDistance() {
            let totalDistance = 0;
            for (let i = 0; i < measurePositions.length - 1; i++) {
                totalDistance += Cesium.Cartesian3.distance(measurePositions[i], measurePositions[i+1]);
            }
            alert(`مسافت محاسبه شده: ${(totalDistance / 1000).toFixed(2)} کیلومتر`);
        }

        function clearAnalysis() {
            viewer3D.entities.removeAll();
            viewer2D.entities.removeAll();
            measurePositions = [];
            activePolyline = null;
            activeMode = null;
        }

        function changeBaseMap(is3D) {
            const viewer = is3D ? viewer3D : viewer2D;
            viewer.imageryLayers.removeAll();
            viewer.imageryLayers.addImageryProvider(new Cesium.OpenStreetMapImageryProvider({
                url: 'https://b.tile.openstreetmap.org/'
            }));
        }

        // اجرای اولیه برنامه با بارگذاری کامل صفحه
        window.onload = initGIS;
    </script>
</body>
</html>
